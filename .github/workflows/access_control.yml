name: "Branch Access Control"

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-branch-access:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Check unauthorized file changes
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch is: $BRANCH"

          if [[ "$BRANCH" == "webdev" ]]; then
            UNAUTHORIZED=$(git diff --name-only origin/main...HEAD | grep -v "^website/")
            if [[ ! -z "$UNAUTHORIZED" ]]; then
              echo "Unauthorized changes in webdev branch:"
              echo "$UNAUTHORIZED"
              exit 1
            fi
          fi

          if [[ "$BRANCH" == "waf" ]]; then
            UNAUTHORIZED=$(git diff --name-only origin/main...HEAD | grep -v "^infrastructure/waf/")
            if [[ ! -z "$UNAUTHORIZED" ]]; then
              echo "Unauthorized changes in waf branch:"
              echo "$UNAUTHORIZED"
              exit 1
            fi
          fi

          if [[ "$BRANCH" == "distribution" ]]; then
            UNAUTHORIZED=$(git diff --name-only origin/main...HEAD | grep -v "^infrastructure/modules/distribution/")
            if [[ ! -z "$UNAUTHORIZED" ]]; then
              echo "Unauthorized changes in distribution branch:"
              echo "$UNAUTHORIZED"
              exit 1
            fi
          fi

          echo "Access control passed."
